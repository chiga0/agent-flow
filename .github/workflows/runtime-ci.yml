name: Runtime CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check style
        run: python3 scripts/check_style.py

      - name: Validate local/NAS Compose profile
        run: >-
          docker compose --env-file deploy/runtime.local-nas.env.example
          -f deploy/docker-compose.runtime.yml config --quiet

      - name: Compile runtime
        run: python3 -m compileall -q runtime scripts

      - name: Install runtime test dependencies
        run: python3 -m pip install "coverage>=7,<8" -r runtime/requirements.txt

      - name: Runtime tests with coverage gate
        run: python3 scripts/check_runtime_coverage.py

      - name: V2 control-plane smoke
        run: |
          PYTHONPATH=runtime python3 scripts/smoke_v2_control_plane.py \
            --artifact-root "$RUNNER_TEMP/agentflow-v2-smoke" \
            --timeout 10

      - name: Local/NAS one-command acceptance
        run: |
          make local-up
          make local-demo

      - name: Stop local/NAS acceptance stack
        if: always()
        run: make local-down

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Web lint
        working-directory: web
        run: npm run lint

      - name: Web tests with coverage gate
        working-directory: web
        run: npm run test

      - name: Build web console
        working-directory: web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Web E2E
        working-directory: web
        run: npm run test:e2e

      - name: Build docs
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          mkdocs build --strict

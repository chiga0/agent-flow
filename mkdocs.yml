site_name: AgentFlow
site_description: AgentFlow is a self-hosted agent orchestration platform for long-running tasks, governance, auditability, and recovery.
site_url: https://chiga0.github.io/agent-flow/
repo_url: https://github.com/chiga0/agent-flow
repo_name: chiga0/agent-flow

theme:
  name: shadcn
  language: zh
  custom_dir: overrides
  katex_options: {}

nav:
  - 首页: index.md
  - 上手与使用:
      - 快速开始: getting-started.md
      - 核心概念: concepts.md
      - Client 使用指南: user-guide.md
      - Admin 管理指南: admin-guide.md
  - 部署与接入:
      - 部署指南: deployment-runbook.md
      - 自托管与 CI: self-deploy.md
      - 执行单元注册与调度: execution-units.md
      - IM 机器人接入: channel-integrations.md
      - 本机/NAS 主控部署: implementation/local-nas-control-plane-deployment.md
      - 排障手册: troubleshooting.md
  - 架构与治理:
      - 架构总览: architecture.md
      - 架构走读: architecture-walkthrough.md
      - Roadmap: roadmap.md
      - 产品与架构审计: audit.md
      - ACP、A2A 与 MCP 协议选型: implementation/protocol-acp-a2a.md
      - Temporal 适配方案: implementation/temporal-evaluation.md
      - 事件溯源与回放: implementation/event-sourcing-and-replay.md
      - Qwen WebShell Chat 渲染: implementation/qwen-webshell-chat-rendering.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      min_search_length: 1
      lang:
        - zh
        - en

extra_javascript:
  - javascripts/vendor/mermaid.min.js
  - javascripts/mermaid-init.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/shadcn-overrides.css

site_name: AgentFlow
site_description: AgentFlow is an Agent orchestration system for long-running cloud execution, governance, auditability, and recovery.
site_url: https://chiga0.github.io/agent-research/
repo_url: https://github.com/chiga0/agent-research
repo_name: chiga0/agent-research

theme:
  name: shadcn
  language: zh
  custom_dir: overrides
  katex_options: {}

nav:
  - 首页: index.md
  - 快速开始:
      - 认识 AgentFlow: getting-started.md
      - 核心概念: concepts.md
      - 架构与术语: architecture.md
      - 使用管理台: user-guide.md
      - 自我部署: self-deploy.md
      - 排障手册: troubleshooting.md
  - 运维与审计:
      - AgentFlow 操作手册: implementation/operation-manual.md
      - 产品可用性审计: implementation/product-usability-audit.md
      - 方案审计与 Review 记录: implementation/review-and-audit-record.md
      - 本地或 NAS 主控部署教程: implementation/local-nas-control-plane-deployment.md
      - 实施 Roadmap: implementation/implementation-roadmap.md
  - 架构设计:
      - 架构总览: implementation/index.md
      - AgentFlow 架构与术语: architecture.md
      - AgentFlow V2 产品与架构整体方案: implementation/v2-product-architecture.md
      - 稳定单 Agent 执行单元: implementation/stable-agent-execution-unit.md
      - SubAgent 与独立执行单元边界: implementation/subagent-vs-execution-unit.md
      - 基于 qwen-code serve 的云端单 Agent 单元方案: implementation/qwen-serve-single-agent-cloud-unit.md
      - 基于 Qwen WebShell 的 Chat 渲染方案: implementation/qwen-webshell-chat-rendering.md
      - 沙箱与隔离方案: implementation/sandbox-isolation.md
      - ACP、A2A 与 MCP 协议选型: implementation/protocol-acp-a2a.md
      - Temporal 调研与适配方案: implementation/temporal-evaluation.md
      - 事件溯源、JSONL 与回放: implementation/event-sourcing-and-replay.md
      - 人类介入与权限 Channel 架构: implementation/human-in-the-loop-permission-channel-architecture.md
      - 单 Agent 基座选型: implementation/single-agent-strategy.md
      - 从单 Agent 执行单元到多 Agent 编排: implementation/single-to-multi-agent-implementation-plan.md
      - 外部方案对比与多方向审计: implementation/alternative-solutions-comparative-audit.md
      - DeerFlow 深度调研与 AgentFlow 对比: implementation/deer-flow-comparative-research.md
  - 研究资料:
      - AgentFlow 与企业级 Cloud Agents 技术调研报告: cloud-agents/index.md
      - 生产级多 Agent 系统编排与运行屏障工程: multi-agent/research-on-multi-agent-orchestration-frameworks.md
      - Qwen Code Core 与 SDK Agent 架构分析: other-agents/qwen-code-core-sdk-agent-architecture.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      min_search_length: 1
      lang:
        - zh
        - en

extra_javascript:
  - javascripts/vendor/mermaid.min.js
  - javascripts/mermaid-init.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/shadcn-overrides.css

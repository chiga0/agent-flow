services:
  runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.runtime
    environment:
      RUN_MANAGER_TOKEN: ${RUN_MANAGER_TOKEN:?set RUN_MANAGER_TOKEN}
      RUN_MANAGER_BOOTSTRAP_EMAIL: ${RUN_MANAGER_BOOTSTRAP_EMAIL:-owner@example.com}
      RUN_MANAGER_BOOTSTRAP_PASSWORD: ${RUNTIME_BOOTSTRAP_PASSWORD:?missing} # ggignore
      RUN_MANAGER_BOOTSTRAP_NAME: ${RUN_MANAGER_BOOTSTRAP_NAME:-Owner}
      RUN_MANAGER_SESSION_SECRET: ${RUN_MANAGER_SESSION_SECRET:-}
      RUN_MANAGER_WORKER_CAPACITY: ${RUN_MANAGER_WORKER_CAPACITY:-1}
      RUN_MANAGER_LEASE_TTL_SECONDS: ${RUN_MANAGER_LEASE_TTL_SECONDS:-60}
      RUN_MANAGER_DEFAULT_CPUS: ${RUN_MANAGER_DEFAULT_CPUS:-0.75}
      RUN_MANAGER_MAX_CPUS: ${RUN_MANAGER_MAX_CPUS:-1.0}
      RUN_MANAGER_DEFAULT_MEMORY_MB: ${RUN_MANAGER_DEFAULT_MEMORY_MB:-768}
      RUN_MANAGER_MAX_MEMORY_MB: ${RUN_MANAGER_MAX_MEMORY_MB:-1024}
      RUN_MANAGER_DEFAULT_PIDS: ${RUN_MANAGER_DEFAULT_PIDS:-256}
      RUN_MANAGER_MAX_PIDS: ${RUN_MANAGER_MAX_PIDS:-512}
      RUN_MANAGER_DEFAULT_TIMEOUT_SECONDS: ${RUN_MANAGER_DEFAULT_TIMEOUT_SECONDS:-1800}
      RUN_MANAGER_MAX_TIMEOUT_SECONDS: ${RUN_MANAGER_MAX_TIMEOUT_SECONDS:-3600}
      RUN_MANAGER_CLEANUP_ENABLED: ${RUN_MANAGER_CLEANUP_ENABLED:-1}
      RUN_MANAGER_WORKSPACE_RETENTION_SECONDS: ${RUN_MANAGER_WORKSPACE_RETENTION_SECONDS:-604800}
      RUN_MANAGER_ARTIFACT_RETENTION_SECONDS: ${RUN_MANAGER_ARTIFACT_RETENTION_SECONDS:-2592000}
      RUN_MANAGER_CLEANUP_INTERVAL_SECONDS: ${RUN_MANAGER_CLEANUP_INTERVAL_SECONDS:-3600}
      QWEN_SERVE_URL: ${QWEN_SERVE_URL:-}
      QWEN_SERVE_TOKEN: ${QWEN_SERVE_TOKEN:-}
      QWEN_EXECUTOR_STRATEGY: ${QWEN_EXECUTOR_STRATEGY:-shared}
      QWEN_EXECUTOR_HOST: ${QWEN_EXECUTOR_HOST:-127.0.0.1}
      QWEN_EXECUTOR_PORT_START: ${QWEN_EXECUTOR_PORT_START:-4210}
      QWEN_EXECUTOR_PORT_END: ${QWEN_EXECUTOR_PORT_END:-4310}
      QWEN_EXECUTOR_COMMAND: ${QWEN_EXECUTOR_COMMAND:-}
      QWEN_EXECUTOR_STARTUP_TIMEOUT: ${QWEN_EXECUTOR_STARTUP_TIMEOUT:-20}
      QWEN_EXECUTOR_STOP_TIMEOUT: ${QWEN_EXECUTOR_STOP_TIMEOUT:-5}
      QWEN_CONTAINER_COMMAND: ${QWEN_CONTAINER_COMMAND:-}
      QWEN_CONTAINER_IMAGE: ${QWEN_CONTAINER_IMAGE:-}
      QWEN_CONTAINER_NETWORK: ${QWEN_CONTAINER_NETWORK:-bridge}
      QWEN_CONTAINER_CPUS: ${QWEN_CONTAINER_CPUS:-0.75}
      QWEN_CONTAINER_MEMORY_MB: ${QWEN_CONTAINER_MEMORY_MB:-768}
      QWEN_CONTAINER_PIDS: ${QWEN_CONTAINER_PIDS:-256}
      QWEN_CONTAINER_EXTRA_ARGS: ${QWEN_CONTAINER_EXTRA_ARGS:-}
      QWEN_CONTAINER_BUILD: ${QWEN_CONTAINER_BUILD:-0}
      QWEN_CONTAINER_BASE_IMAGE: ${QWEN_CONTAINER_BASE_IMAGE:-node:22-bookworm-slim}
      QWEN_CONTAINER_NODE_PACKAGE: ${QWEN_CONTAINER_NODE_PACKAGE:-}
    cpus: ${RUNTIME_CPUS:-0.75}
    mem_limit: ${RUNTIME_MEMORY_LIMIT:-768m}
    pids_limit: ${RUNTIME_PIDS_LIMIT:-512}
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${RUNTIME_ARTIFACTS_DIR:-runtime-artifacts}:/data/artifacts
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >
          import os, urllib.request;
          req=urllib.request.Request(
          'http://127.0.0.1:8765/health',
          headers={'Authorization':'Bearer '+os.environ['RUN_MANAGER_TOKEN']});
          urllib.request.urlopen(req, timeout=3).read()
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  runtime-artifacts:
